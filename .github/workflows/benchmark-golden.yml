name: Benchmark Golden Snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  golden-benchmark:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          grep -vE '^(mlx|mlx-|mflux)' requirements.txt | grep -v '^#' | grep -v '^[[:space:]]*$' > /tmp/requirements-ci.txt
          pip install -r /tmp/requirements-ci.txt
          pip install "mflux==0.18.0" --no-deps
          pip install "platformdirs>=4.0,<5.0" "toml>=0.10.2,<1.0" "piexif>=1.1.3,<2.0"
          pip install -r requirements-test.txt

      - name: Golden benchmark snapshot tests (MLX-74)
        run: |
          export DJANGO_SETTINGS_MODULE=mlx_orchestrator.settings
          export MLX_DISABLE_INSTANCE_WATCHDOG=1
          export NADIR_CI_STUB_MLX=1
          pytest -m golden orchestrator/tests/test_benchmark_golden.py -q
