# Nadir Gateway — curated OpenAPI contract (MLX-47)
# Source of truth for pytest -m contract on endpoints marked ✅ in docs/usage/nadir-gateway-coverage-matrix.md
# OpenAI reference shapes; Nadir extensions allowed via additionalProperties where noted.
openapi: 3.0.3
info:
  title: Nadir Gateway (curated contract)
  version: 0.1.0
  description: >-
    Subset of the Nadir gateway API guaranteed to remain OpenAI-compatible
    on request/response shapes. Lifecycle (wake/idle) is tested separately (pytest -m smoke).

paths:
  /v1/models:
    get:
      operationId: listModels
      summary: List models
      responses:
        "200":
          description: OpenAI-compatible model list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelList"

  /v1/chat/completions:
    post:
      operationId: createChatCompletion
      summary: Create chat completion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: Chat completion (non-streaming)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletion"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorResponse"
        "404":
          description: Model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorResponse"
        "503":
          description: Model unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorResponse"

components:
  schemas:
    ModelList:
      type: object
      required: [object, data]
      additionalProperties: false
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: "#/components/schemas/Model"

    Model:
      type: object
      required: [id, object, created, owned_by]
      properties:
        id:
          type: string
        object:
          type: string
          enum: [model]
        created:
          type: integer
        owned_by:
          type: string
        metadata:
          type: object
          description: Nadir extensions (launch_mode, nadir.lifecycle_mode, etc.)
          additionalProperties: true

    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
        messages:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ChatMessage"
        stream:
          type: boolean
        temperature:
          type: number
        max_tokens:
          type: integer
      additionalProperties: true

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool, developer]
        content:
          oneOf:
            - type: string
            - type: array
      additionalProperties: true

    ChatCompletion:
      type: object
      required: [id, object, created, model, choices]
      properties:
        id:
          type: string
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ChatCompletionChoice"
        usage:
          $ref: "#/components/schemas/CompletionUsage"
      additionalProperties: true

    ChatCompletionChoice:
      type: object
      required: [index, message, finish_reason]
      properties:
        index:
          type: integer
        message:
          $ref: "#/components/schemas/ChatCompletionMessage"
        finish_reason:
          type: string
          nullable: true
      additionalProperties: true

    ChatCompletionMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
        content:
          type: string
          nullable: true
      additionalProperties: true

    CompletionUsage:
      type: object
      properties:
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer
      additionalProperties: true

    OpenAIErrorResponse:
      type: object
      required: [error]
      additionalProperties: false
      properties:
        error:
          type: object
          required: [message, type]
          properties:
            message:
              type: string
            type:
              type: string
            code:
              type: string
          additionalProperties: true
